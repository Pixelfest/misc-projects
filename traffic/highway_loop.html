<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highway Loop Simulation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Highway Loop Simulation</h1>
    <div class="controls">
        <label>
            Highway Length (km)
            <input type="number" id="lengthInput" value="5" min="1" max="20" step="0.5">
        </label>
        <label>
            Min Speed (km/h)
            <input type="number" id="minSpeedInput" value="80" min="10" max="200" step="5">
        </label>
        <label>
            Max Speed (km/h)
            <input type="number" id="maxSpeedInput" value="90" min="10" max="200" step="5">
        </label>
        <label>
            Following Distance (seconds)
            <input type="number" id="followingDistanceInput" value="2" min="0.5" max="5" step="0.5">
        </label>
        <label>
            Number of Cars
            <input type="number" id="carsInput" value="10" min="1" max="50" step="1">
        </label>
        <button onclick="updateSimulation()">Update</button>
    </div>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Specifications:</h3>
        <p id="specs"></p>
        <p><strong>Scale:</strong> <span id="scaleInfo"></span></p>
        <p><strong>Car Speed:</strong> <span id="speedInfo"></span></p>
        <p><strong>Loop Time:</strong> <span id="loopTime"></span></p>
    </div>

    <script src="simulation.js"></script>
</body>
</html>
